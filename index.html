<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anderson 的電子名片</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            width: 90%;
            max-width: 350px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { margin-bottom: 5px; color: #333; }
        p { color: #666; margin-bottom: 25px; }
        .qr-section {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 15px;
        }
        .qr-section h3 { margin-top: 0; font-size: 16px; color: #444; }
        img { width: 100%; max-width: 200px; border-radius: 10px; }
        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #07c160; /* 微信綠 */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .line-btn { background-color: #06c755; } /* LINE 綠 */
    </style>
</head>
<body>

<div class="card">
    <h1>Anderson</h1>
    <p>自行車設計師 | Moling</p>

    <div class="qr-section">
        <h3>微信加好友</h3>
        <img src="Anderson-WeChat.jpg" alt="WeChat QR Code">
    </div>

    <div class="qr-section">
        <h3>LINE 聯繫</h3>
        <p style="font-size: 12px;">點擊下方按鈕或掃描 QR Code</p>
        <a href="https://line.me/ti/p/你的ID" class="btn line-btn">開啟 LINE</a>
    </div>

    <footer style="font-size: 12px; color: #ccc; margin-top: 20px;">
        © 2026 Moling Design
    </footer>
</div>

</body>
</html>
