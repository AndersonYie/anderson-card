<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molingbikes - Anderson Yie</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --line-color: #00c300;
            --wechat-teal: #20b2aa; 
            --bg-color: #f4f7f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--primary-color);
        }

        .container {
            width: 92%;
            max-width: 400px;
            background: white;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .top-row {
            display: flex;
            align-items: center;
            gap: 60px; /* Logo 與姓名的間距 */
        }

        .logo {
            width: 120px;
            height: auto;
        }

        .name-info {
            display: flex;
            flex-direction: column;
            margin-top: 10px; /* 姓名整體下移高度 */
        }

        .name-zh {
            font-size: 1.25rem;
            font-weight: bold;
            line-height: 1.2;
        }

        .name-en {
            font-size: 1rem;
            font-family: Arial, sans-serif;
            color: #333;
            margin-top: 5px; /* 中英文間距 */
        }

        .title-row {
            width: 100%;
            text-align: right;
            margin-top: 1px; 
            margin-bottom: 25px;
            padding-right: 5px;
            border-top: 1px solid #eeeeee; /* 職稱上方的灰色細線 */
            padding-top: 5px;
        }

        .job-title {
            font-size: 0.85rem;
            color: #7f8c8d;
            font-weight: 600;
            letter-spacing: 0.5px;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .brand-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-name {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .slogan {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-line {
            background-color: var(--line-color);
            box-shadow: 0 4px 12px rgba(0, 195, 0, 0.2);
        }

        .btn-wechat {
            background-color: var(--wechat-teal);
            box-shadow: 0 4px 12px rgba(32, 178, 170, 0.2);
        }

        .copy-tip {
            font-size: 0.75rem;
            color: #888;
            text-align: center;
            margin-top: -10px;
            min-height: 1em;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #bbb;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-row">
        <img src="moling-logo.png" alt="Molingbikes Logo" class="logo">
        <div class="name-info">
            <div class="name-zh">易柏村</div>
            <div class="name-en">Anderson Yie</div>
        </div>
    </div>

    <div class="title-row">
        <span class="job-title">R&D Director</span>
    </div>
    
    <div class="brand-section">
        <h1 class="brand-name">Molingbikes</h1>
        <div class="slogan">
            <p>專業自行車設計 ‧ 全方位解決方案</p>
            <p>Your Vision, Our Solution.</p>
        </div>
    </div>

    <div class="btn-group">
        <a href="https://line.me/ti/p/RkjNNAeJX_" class="btn btn-line">加 LINE 好友</a>

        <button class="btn btn-wechat" onclick="copyWeChatLink()">
            點擊複製 WeChat 連結
        </button>
        <p id="copy-tip" class="copy-tip">複製後貼到微信內開啟即可加好友</p>
    </div>

    <div class="footer">
        © 2026 Molingbikes. All Rights Reserved.
    </div>
</div>

<script>
function copyWeChatLink() {
    const link = "https://short.wailian2.cn/l/17o7LGGG5H2Pm72C";
    
    // 執行複製功能 
    navigator.clipboard.writeText(link).then(() => {
        const tip = document.getElementById('copy-tip');
        tip.innerText = "✅ 連結已複製！請到微信貼上開啟";
        tip.style.color = "#20b2aa";
        
        // 3秒後恢復原始提示語 
        setTimeout(() => {
            tip.innerText = "複製後貼到微信內開啟即可加好友";
            tip.style.color = "#888";
        }, 3000);
    }).catch(err => {
        console.error('無法複製', err);
    });
}
</script>

</body>
</html>
