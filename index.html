<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molingbikes - Anderson Yie</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --line-color: #00c300;
            --wechat-teal: #20b2aa; /* 藍綠色 LightSeaGreen */
            --bg-color: #f4f7f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--primary-color);
        }

        .container {
            width: 92%;
            max-width: 400px;
            background: white;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Header 區域：Logo 與 姓名緊鄰 */
        .header-top {
            display: flex;
            align-items: center; /* 讓 Logo 和姓名垂直置中對齊 */
            gap: 15px; /* Logo 與姓名的間距 */
            margin-bottom: 5px;
        }

        .logo {
            width: 130px; /* 稍微縮小一點點讓比例更好看 */
            height: auto;
        }

        .name-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .name-zh {
            font-size: 1.3rem;
            font-weight: bold;
            line-height: 1.2;
        }

        .name-en {
            font-size: 1rem;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #333;
        }

        /* 職稱單獨一行，完全靠右 */
        .job-row {
            width: 100%;
            text-align: right;
            margin-bottom: 30px;
            border-top: 1px solid #eee; /* 加一條細線區隔 */
            padding-top: 8px;
        }

        .job-title {
            font-size: 0.8rem;
            color: #888;
            font-family: 'Segoe UI', Arial, sans-serif;
            letter-spacing: 1px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .slogan {
            font-size: 0.95rem;
            color: #555;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 1px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-line {
            background-color: var(--line-color);
            box-shadow: 0 4px 12px rgba(0, 195, 0, 0.2);
        }

        .btn-wechat {
            background-color: var(--wechat-teal);
            box-shadow: 0 4px 12px rgba(32, 178, 170, 0.2);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #bbb;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-top">
        <img src="moling-logo.png" alt="Molingbikes Logo" class="logo">
        <div class="name-box">
            <div class="name-zh">易柏村</div>
            <div class="name-en">Anderson Yie</div>
        </div>
    </div>

    <div class="job-row">
        <span class="job-title">R&D Director</span>
    </div>
    
    <div class="slogan">
        <p>專業自行車設計 ‧ 全方位解決方案</p>
    </div>

    <div class="btn-group">
        <a href="https://line.me/ti/p/RkjNNAeJX_" class="btn btn-line">
            加 LINE 好友
        </a>

        <a href="#" class="btn btn-wechat" onclick="alert('微信鏈結建置中，請稍候')">
            加 WeChat 好友
        </a>
    </div>

    <div class="footer">
        © 2026 Molingbikes. All Rights Reserved.
    </div>
</div>

</body>
</html>
