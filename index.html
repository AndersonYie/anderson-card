<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molingbikes - Anderson Yie</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --line-color: #00c300;
            --wechat-teal: #008b8b; /* 藍綠色 */
            --bg-color: #f4f7f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--primary-color);
        }

        .container {
            width: 95%;
            max-width: 400px;
            background: white;
            padding: 35px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* 新增：Header 佈局 (Logo左，姓名右) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .logo {
            width: 150px;
            height: auto;
        }

        .name-card {
            text-align: right;
        }

        .name-zh {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .name-en {
            font-size: 1rem;
            font-family: Arial, Helvetica, sans-serif; /* 現代英文字體 */
            font-weight: 500;
        }

        .job-title {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
            font-family: Arial, Helvetica, sans-serif;
            text-align: right;
            border-top: 1px solid #eee;
            padding-top: 5px;
        }

        .slogan {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
            text-align: center;
            clear: both;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-line {
            background-color: var(--line-color);
            box-shadow: 0 4px 14px rgba(0, 195, 0, 0.3);
        }

        .btn-wechat {
            background-color: var(--wechat-teal);
            box-shadow: 0 4px 14px rgba(0, 139, 139, 0.3);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="moling-logo.png" alt="Molingbikes Logo" class="logo">
        <div class="name-card">
            <div class="name-zh">易柏村</div>
            <div class="name-en">Anderson Yie</div>
            <div class="job-title">R&D Director</div>
        </div>
    </div>
    
    <div class="slogan">
        <p>專業自行車設計 ‧ 全方位解決方案</p>
    </div>

    <div class="btn-group">
        <a href="https://line.me/ti/p/RkjNNAeJX_" class="btn btn-line">
            加 LINE 好友
        </a>

        <a href="#" class="btn btn-wechat" onclick="alert('微信鏈結建置中，請稍候')">
            加 微信 好友
        </a>
    </div>

    <div class="footer">
        © 2026 Molingbikes. All Rights Reserved.
    </div>
</div>

</body>
</html>
