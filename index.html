<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molingbikes - 自行車設計與解決方案</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --line-color: #00c300;
            --wechat-color: #07c160;
            --bg-color: #f4f7f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--primary-color);
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo {
            width: 150px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .slogan {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-line {
            background-color: var(--line-color);
            box-shadow: 0 4px 14px rgba(0, 195, 0, 0.3);
        }

        .btn-wechat {
            background-color: var(--wechat-color);
            box-shadow: 0 4px 14px rgba(7, 193, 96, 0.3);
        }

        .btn-icon {
            width: 24px;
            margin-right: 10px;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #999;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="moling-logo.png" alt="Molingbikes Logo" class="logo">
    
    <h1>Molingbikes</h1>
    
    <div class="slogan">
        <p>專業自行車設計 ‧ 全方位解決方案</p>
        <p>Your Vision, Our Solution.</p>
    </div>

    <div class="btn-group">
        <a href="https://line.me/ti/p/RkjNNAeJX_" class="btn btn-line">
            加 LINE 好友
        </a>

        <a href="#" class="btn btn-wechat" onclick="alert('微信鏈結建置中，請稍候')">
            加 微信 好友
        </a>
    </div>

    <div class="footer">
        © 2026 Molingbikes. All Rights Reserved.
    </div>
</div>

</body>
</html>
