<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anderson Yie - Molingbikes</title>
    <style>
        :root {
            --line-green: #00c300;
            --morandi-green: #8DA399; /* 莫蘭迪綠 */
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff; /* 純白底色 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Helvetica Neue', Helvetica, Arial, "PingFang TC", "Microsoft JhengHei", sans-serif;
            color: var(--text-main);
        }

        .container {
            width: 85%;
            max-width: 400px;
            padding: 20px;
        }

        /* Logo 左移 */
        .logo-box {
            text-align: left;
            margin-bottom: 30px;
        }

        .logo {
            height: 50px;
            width: auto;
        }

        /* 個人資訊區 */
        .profile-info {
            text-align: left;
            margin-bottom: 40px;
        }

        .name-zh {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .name-en {
            font-size: 20px;
            font-weight: 500;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* 較好看的英文字體 */
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .job-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-sub);
            letter-spacing: 1.5px;
            text-transform: uppercase; /* 職稱大寫增加專業感 */
        }

        /* 按鈕區 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-line {
            background-color: var(--line-green);
        }

        .btn-wechat {
            background-color: var(--morandi-green);
        }

        .slogan {
            margin-top: 50px;
            text-align: center;
            font-size: 13px;
            color: #bdc3c7;
            line-height: 1.8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-box">
        <img src="moling-logo.png" alt="Molingbikes" class="logo">
    </div>

    <div class="profile-info">
        <div class="name-zh">易柏村</div>
        <div class="name-en">Anderson Yie</div>
        <div class="job-title">R&D Director</div>
    </div>

    <div class="btn-group">
        <a href="https://line.me/ti/p/RkjNNAeJX_" class="btn btn-line">
            LINE 聯繫
        </a>

        <a href="#" class="btn btn-wechat" onclick="alert('微信鏈結建置中')">
            WeChat 聯繫
        </a>
    </div>

    <div class="slogan">
        <p>懋綸有限公司 | Molingbikes</p>
        <p>自行車設計與解決方案</p>
    </div>
</div>

</body>
</html>
